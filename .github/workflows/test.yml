name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install xcodegen
        # TODO: pin to a release tarball with a known SHA256 to avoid a compromised
        # Homebrew formula landing silently in CI. To pin: pick a version from
        # https://github.com/yonaskolb/XcodeGen/releases, download xcodegen.zip,
        # compute `shasum -a 256 xcodegen.zip`, and replace this step with a
        # curl + checksum-verify + install sequence using that SHA.
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Mosaic

      - name: Build
        run: |
          xcodebuild build \
            -scheme Mosaic \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -scheme MosaicTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
