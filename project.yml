name: Mosaic
options:
  bundleIdPrefix: com.jeff
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    branch: main

targets:
  Mosaic:
    type: application
    platform: macOS
    sources:
      - path: Mosaic
        excludes:
          - Resources/Info.plist
    resources:
      - path: Mosaic/Resources/Assets.xcassets
    info:
      path: Mosaic/Resources/Info.plist
      properties:
        CFBundleDisplayName: Mosaic
        CFBundleIdentifier: com.jeff.Mosaic
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        NSPrincipalClass: NSApplication
        NSMainNibFile: ""
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: targeted
        PRODUCT_NAME: Mosaic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SwiftTerm

  MosaicTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - target: Mosaic
