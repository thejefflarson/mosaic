name: Mosaic
options:
  bundleIdPrefix: com.jeff
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    revision: 3c45fdcfcf4395c72d2a4ee23c0bce79017b5391
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    # upToNextMinor prevents picking up unexpected 2.x minor bumps.
    # Preferred: pin to a specific revision like SwiftTerm — check the resolved
    # version in Mosaic.xcodeproj after first build and replace with `revision: <hash>`.
    upToNextMinor: 2.0.0

schemes:
  Mosaic:
    build:
      targets:
        Mosaic: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MosaicTests
    profile:
      config: Release
    archive:
      config: Release
  MosaicTests:
    build:
      targets:
        MosaicTests: all
    test:
      config: Debug
      targets:
        - MosaicTests

targets:
  Mosaic:
    type: application
    platform: macOS
    sources:
      - path: Mosaic
        excludes:
          - Resources/Info.plist
    resources:
      - path: Mosaic/Resources/Assets.xcassets
      - path: Mosaic/App/Mosaic.sdef
    info:
      path: Mosaic/Resources/Info.plist
      properties:
        OSAScriptingDefinition: Mosaic.sdef
        CFBundleDisplayName: Mosaic
        CFBundleIdentifier: com.jeff.Mosaic
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        NSPrincipalClass: NSApplication
        NSMainNibFile: ""
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSAppleScriptEnabled: true
        LSApplicationCategoryType: public.app-category.productivity
        SUFeedURL: https://raw.githubusercontent.com/thejefflarson/mosaic/main/appcast.xml
        # Generate with: find ~/Library/Developer/Xcode/DerivedData -name generate_keys -path '*/Sparkle*/bin/*' | head -1
        SUPublicEDKey: REPLACE_WITH_OUTPUT_OF_generate_keys
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_NAME: Mosaic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SwiftTerm
      - package: Sparkle
        product: Sparkle

  MosaicTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Mosaic
